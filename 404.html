<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:#4A0F1C;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}

/* Foto de fundo */
.bg{position:fixed;inset:0;z-index:0}
.bg img{width:100%;height:100%;object-fit:cover;object-position:60% center;opacity:.18;filter:grayscale(100%)}
.bg-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(74,15,28,.97) 0%,rgba(107,26,42,.85) 50%,rgba(74,15,28,.6) 100%)}

/* Deco */
.deco-circle{position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;border-radius:50%;border:1px solid rgba(201,169,110,.08);pointer-events:none;z-index:0}
.deco-line{position:fixed;top:0;right:20%;width:1px;height:100%;background:linear-gradient(to bottom,transparent,rgba(201,169,110,.1) 30%,rgba(201,169,110,.1) 70%,transparent);pointer-events:none;z-index:0}

/* Conteúdo */
.card{position:relative;z-index:2;max-width:520px;width:100%;padding:2.5rem 2rem;text-align:center}

.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:3rem;text-decoration:none}
.logo-mark{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(201,169,110,.35);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;letter-spacing:1px}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:15px;color:rgba(255,255,255,.8);text-align:left;line-height:1.2}
.logo-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);display:block}

.code{font-family:'Cormorant Garamond',serif;font-size:clamp(80px,18vw,140px);color:rgba(201,169,110,.25);line-height:1;font-weight:300;letter-spacing:-4px;margin-bottom:-.5rem}
.gold-line{width:48px;height:1px;background:rgba(201,169,110,.4);margin:0 auto 1.5rem}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,5vw,36px);font-weight:400;color:#fff;margin-bottom:.75rem;line-height:1.2}
h1 em{color:#C9A96E;font-style:italic}
p{font-size:15px;color:rgba(255,255,255,.55);line-height:1.75;font-weight:300;margin-bottom:2.5rem;max-width:380px;margin-left:auto;margin-right:auto}

.btns{display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto}
.btn-p{background:#A0834A;color:#fff;padding:15px 24px;border-radius:50px;font-size:15px;font-weight:500;text-decoration:none;transition:all .2s;display:block}
.btn-p:hover{background:#C9A96E;transform:translateY(-1px)}
.btn-s{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75);padding:14px 24px;border-radius:50px;font-size:15px;font-weight:300;text-decoration:none;transition:all .2s;display:block}
.btn-s:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4)}

.back{margin-top:2rem;font-size:12px;color:rgba(255,255,255,.3);font-weight:300}
.back a{color:rgba(201,169,110,.5);text-decoration:none}
.back a:hover{color:rgba(201,169,110,.8)}

@media(max-width:480px){
  .card{padding:2rem 1.25rem}
  .code{font-size:100px}
}
</style>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="theme-color" content="#4A0F1C">
</head>
<body>

<div class="card">

    <div class="logo-mark">RK</div>
    <div class="logo-name">

  <div class="code">404</div>

  <p>A página que você procura não existe ou foi movida. Mas o que você precisa está bem aqui — descubra qual procedimento é ideal para o seu corpo.</p>

  </div>

  <p class="back">ou <a href="/">voltar ao início</a></p>
</div>
</body>
</html>
